geometry:
  fms initialization:
    namelist filename: Data/fv3files/fmsmpp.nml
    field table filename: Data/fv3files/field_table_lam_rrfs
  namelist filename: Data/fv3files/input_lam_c1667.nml
  akbk: Data/inputs/lam_rrfs/INPUT/akbk65.nc


background:
  datetime: 2020-12-15T00:00:00Z
  filetype: fms restart
  datapath: Data/inputs/lam_c1667/bkg
  filename_core: 20201215.000000.rrfs_C1667.fv_core.res.tile1.nc
  filename_trcr: 20201215.000000.rrfs_C1667.fv_tracer.res.tile1.nc
  filename_sfcw: 20201215.000000.rrfs_C1667.fv_srf_wnd.res.tile1.nc
  filename_sfcd: 20201215.000000.rrfs_C1667.sfc_data.nc
  filename_cplr: 20201215.000000.rrfs_C1667.coupler.res

  state variables:
    - air_temperature

  field io names:
    air_temperature: T


background error:
  covariance model: SABER

  saber central block:
    saber block name: BUMP_NICAS

    calibration:
      drivers:
        compute nicas: true
        write local nicas: true
        multivariate strategy: univariate

      io:
        files prefix: Data/bump/fv3jedi_bumpparameters_c1667

      nicas:
        resolution: 6
        explicit length-scales: true
        horizontal length-scale:
          - groups: [air_temperature]
            value: 250000.0
        vertical length-scale:
          - groups: [air_temperature]
            value: 0.3

      grids:
        - model:
            variables: [air_temperature]
